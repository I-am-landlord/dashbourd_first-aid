<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geography | Kids Program</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --brand-orange: #ED9740; --brand-blue: #60ABAF; }
        body, html { min-height: 100vh; background: #fff; font-family: 'Inter', sans-serif; color: #1e293b; margin: 0; }
        
        @media (min-width: 1024px) { body, html { height: 100vh; overflow: hidden; } }

        /* Карта та контейнер */
        .map-wrapper { position: relative; width: 100%; height: 350px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        @media (min-width: 1024px) { .map-wrapper { height: 100%; flex: 1; } }
        
        #map-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #map-container svg { width: 100%; height: 100%; display: block; }
        #map-container svg path { fill: #E2E8F0 !important; stroke: #fff !important; stroke-width: 0.8; transition: 0.4s ease; cursor: pointer; }
        
        .area-active { filter: drop-shadow(0 0 12px rgba(0,0,0,0.15)); stroke: #1e293b !important; stroke-width: 2 !important; }

        /* Слайдери */
        .main-slider { width: 100%; height: 180px; border-radius: 1.5rem; overflow: hidden; }
        @media (min-width: 768px) { .main-slider { height: 220px; } }
        .main-slider img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

        #modal-slider-container { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #modal-slider-container.active { opacity: 1; pointer-events: auto; }
        
        .modal-swiper { width: 100%; height: 85vh; }
        .modal-swiper img { max-width: 90%; max-height: 90%; object-fit: contain; margin: auto; }
        
        .swiper-button-next, .swiper-button-prev { color: white !important; }
        .swiper-button-next:after, .swiper-button-prev:after { font-size: 24px !important; font-weight: 900; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <div class="h-full grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
        <div class="col-span-1 lg:col-span-5 flex flex-col bg-slate-50 rounded-[2rem] lg:rounded-[2.5rem] p-6 lg:p-8 border border-slate-100">
            <header class="mb-6">
                <h1 class="text-3xl lg:text-4xl font-black uppercase italic tracking-tighter">
                    <span data-i18n="geo.project">Проект</span> <span data-i18n="geo.project.genry" class="text-[#ED9740]">Генрі</span>
                </h1>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.3em]">Ukraine 2026</p>
            </header>
            
            <div class="map-wrapper mb-6">
                <div id="map-container"></div>
            </div>

            <div class="flex gap-6 mt-auto pt-4 border-t border-slate-200">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#60ABAF]"></div>
                    <span class="text-[10px] font-black uppercase" data-i18n="geo.status_done">Реалізовано</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#ED9740]"></div>
                    <span class="text-[10px] font-black uppercase" data-i18n="geo.status_plan">У плані</span>
                </div>
            </div>
        </div>

        <div class="col-span-1 lg:col-span-7 flex flex-col gap-6">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-white border-2 border-slate-50 p-4 rounded-[1.5rem] shadow-sm flex flex-col justify-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1" data-i18n="geo.label_schools">Закладів</p>
                    <h2 id="kpi-schools" class="text-2xl lg:text-3xl font-black italic leading-none">0</h2>
                </div>
                <div class="bg-white border-2 border-slate-50 p-4 rounded-[1.5rem] shadow-sm flex flex-col justify-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1" data-i18n="geo.label_children">Дітей</p>
                    <h2 id="kpi-children" class="text-2xl lg:text-3xl font-black italic text-[#60ABAF] leading-none">0</h2>
                </div>
                <div class="col-span-2 md:col-span-1 flex items-center">
                    <select id="region-filter" onchange="handleFilter(this.value)" class="w-full h-14 lg:h-16 bg-slate-900 text-white px-6 rounded-[1.2rem] lg:rounded-[1.5rem] font-bold text-[10px] uppercase outline-none cursor-pointer">
                        <option value="all" data-i18n="geo.all_ukraine">Вся Україна</option>
                    </select>
                </div>
            </div>

            <div class="flex-1 bg-slate-50 rounded-[2rem] lg:rounded-[2.5rem] p-6 lg:p-10 flex flex-col min-h-[300px]">
                <div class="custom-scroll overflow-y-auto pr-2 mb-4 lg:flex-1">
                    <h3 id="page-title" class="text-2xl font-black uppercase italic mb-3">...</h3>
                    <p id="page-desc" class="text-slate-500 leading-relaxed font-medium text-sm lg:text-base"></p>
                </div>
                <div class="mt-auto pt-4 flex items-center justify-between border-t border-slate-200">
                    <span class="text-[10px] font-black uppercase text-slate-400" data-i18n="geo.label_kits">Наборів:</span>
                    <span id="kpi-kits" class="text-3xl lg:text-4xl font-black italic text-[#ED9740]">0</span>
                </div>
            </div>

            <div class="swiper main-slider shadow-xl">
                <div id="photo-wrapper" class="swiper-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </div>

    <div id="modal-slider-container">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-5xl z-[110] hover:text-[#ED9740]">&times;</button>
        <div class="swiper modal-swiper">
            <div id="modal-photo-wrapper" class="swiper-wrapper"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        let data = null;
        let translations = {};
        const currentLang = localStorage.getItem('lang') || 'uk';
        let modalSwiper;

        async function init() {
            try {
                const [mapRes, dataRes, transRes] = await Promise.all([
                    fetch('../assets/ukraine.svg'),
                    fetch('../assets/images/data.json'),
                    fetch('../assets/translations.json')
                ]);

                const svgText = await mapRes.text();
                const allData = await dataRes.json();
                const allTrans = await transRes.json();
                
                data = allData.geography;
                translations = allTrans[currentLang] || allTrans['uk'];

                // Карта
                const container = document.getElementById('map-container');
                container.innerHTML = svgText;
                const svg = container.querySelector('svg');
                if (svg) {
                    svg.removeAttribute('width'); 
                    svg.removeAttribute('height');
                    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                    // Примусове масштабування viewBox
                    const b = svg.getBBox();
                    svg.setAttribute('viewBox', `${b.x} ${b.y} ${b.width} ${b.height}`);
                }

                applyStaticTranslations();
                setupUI();
                resetView();

            } catch (err) { console.error("Init Error:", err); }
        }

        function applyStaticTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) el.innerText = translations[key];
            });
        }

        function setupUI() {
            if (!data) return;
            const filter = document.getElementById('region-filter');
            const wrapper = document.getElementById('photo-wrapper');
            const modalWrapper = document.getElementById('modal-photo-wrapper');

            // Налаштування областей
            data.regions.forEach(reg => {
                const path = document.getElementById(reg.id.toUpperCase()) || document.getElementById(reg.id.toLowerCase());
                if (path) {
                    path.style.setProperty('fill', reg.year === 2025 ? '#60ABAF' : '#ED9740', 'important');
                    path.onclick = () => { filter.value = reg.id; handleFilter(reg.id); };
                }
                const opt = document.createElement('option');
                opt.value = reg.id;
                opt.textContent = translations[reg.id] || reg.name; 
                filter.appendChild(opt);
            });

            // Налаштування фото
            data.photos.forEach((url, idx) => {
                wrapper.innerHTML += `<div class="swiper-slide"><img src="../${url}" onclick="openLightbox(${idx})"></div>`;
                modalWrapper.innerHTML += `<div class="swiper-slide flex items-center justify-center"><img src="../${url}"></div>`;
            });

            // Ініціалізація Swiper
            new Swiper(".main-slider", {
                slidesPerView: 1.5, spaceBetween: 10, centeredSlides: true, loop: true,
                autoplay: { delay: 3500 }, pagination: { el: ".swiper-pagination", clickable: true },
                breakpoints: { 1024: { slidesPerView: 3, spaceBetween: 15, centeredSlides: false } }
            });

            modalSwiper = new Swiper(".modal-swiper", { 
                slidesPerView: 1, 
                loop: true, 
                observer: true, 
                observeParents: true,
                navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                keyboard: { enabled: true }
            });
        }

        function handleFilter(id) {
            document.querySelectorAll('#map-container svg path').forEach(p => p.classList.remove('area-active'));
            if (id === 'all') { resetView(); return; }
            
            const reg = data.regions.find(r => r.id === id);
            const path = document.getElementById(id.toUpperCase()) || document.getElementById(id.toLowerCase());
            if (path) path.classList.add('area-active');

            setVal('kpi-schools', reg.schools); 
            setVal('kpi-children', reg.children || '—');
            setVal('kpi-kits', reg.kits);
            setVal('page-title', translations[id] || reg.name);
            setVal('page-desc', (currentLang === 'en' && reg.details_en) ? reg.details_en : reg.details);
        }

        function resetView() {
            const stats = data.global_stats;
            setVal('kpi-schools', stats.schools); 
            setVal('kpi-children', stats.children);
            setVal('kpi-kits', stats.kits); 
            setVal('page-title', translations["geo.global_title"] || stats.title);
            setVal('page-desc', translations["geo.global_desc"] || stats.description);
        }

        function setVal(id, val) { 
            const el = document.getElementById(id); if (el) el.innerText = val; 
        }

        function openLightbox(idx) {
            document.getElementById('modal-slider-container').classList.add('active');
            document.body.style.overflow = 'hidden';
            setTimeout(() => {
                modalSwiper.update();
                modalSwiper.slideToLoop(idx, 0);
            }, 50);
        }

        function closeLightbox() { 
            document.getElementById('modal-slider-container').classList.remove('active');
            document.body.style.overflow = '';
        }

        window.onload = init;
    </script>
</body>
</html>
