<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Analytics | Trainings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://bumbu.me/svg-pan-zoom/dist/svg-pan-zoom.min.js"></script>
    <style>
:root { --brand-red:#DA291C; --brand-teal:#60ABAF; --brand-orange:#ED9740; --brand-black:#0F0F0F; }
html, body { height:100%; margin:0; font-family:'Lato',sans-serif; color:var(--brand-black); background:#fff; }
.mainSwiper img, .fullSwiper img { user-select:none; -webkit-user-drag:none; pointer-events:none; }
#sidebar-filters, #sidebar-filters * { pointer-events:auto!important; }
#svg-container { position:relative; width:100%; height:100%; background:#fcfcfc; }
#svg-container svg { width:100%; height:100%; display:block; }
path { transition:fill .25s ease; stroke:#fff; stroke-width:.7; fill:#f1f5f9; cursor:pointer; }
path.selected { stroke:var(--brand-black); stroke-width:3; }
path.is-dimmed { opacity:.35; pointer-events:none; }
.owner-btn.active-orange { background:var(--brand-orange); color:#fff; border-color:var(--brand-orange); }
.owner-btn.active-teal { background:var(--brand-teal); color:#fff; border-color:var(--brand-teal); }
.prog-btn.prog-active { border-color:var(--brand-red); background-color:#FFF0F0; }
input[type=radio]:checked+span, input[type=checkbox]:checked+span { font-weight:900; color:var(--brand-red); }
.map-label { font-size:10px; font-weight:700; fill:#0F0F0F; pointer-events:none; text-anchor:middle; }
#gallery-modal { position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:5000; display:none; }
#gallery-modal.active { display:flex; }
.fullSwiper { width:100%; height:100%; }
.fullSwiper .swiper-slide { display:flex; align-items:center; justify-content:center; }
.fullSwiper img { max-width:100%; max-height:100%; object-fit:contain; }

@media(min-width:1025px){
  body{overflow:hidden;}
  .app-grid{display:grid; grid-template-columns:300px minmax(0,1fr) 400px; grid-template-rows:72px minmax(0,1fr) 160px; height:100vh;}
  footer{display:flex; align-items:center; overflow:hidden;}
  .mainSwiper{width:100%; height:100%;}
}
@media(max-width:1024px){
  .app-grid{display:flex; flex-direction:column; height:auto;}
  header{position:sticky; top:0; z-index:1000; height:72px; background:#fff; border-bottom:1px solid #eee;}
  #svg-container{height:55vh; min-height:340px; max-height:420px;}
  .zoom-controls{display:none!important;}
  #sidebar-filters{position:fixed; inset:0 auto 0 -100%; width:300px; background:#fff; z-index:3000; transition:.35s ease; box-shadow:20px 0 50px rgba(0,0,0,.25);}
  #sidebar-filters.active{left:0;}
  #info-panel{padding:24px; border-left:none;}
  footer{padding-bottom:24px;}
  .mainSwiper{height:120px;}
}
@media(min-width:1025px){
  body{overflow:hidden;}
  .app-grid{display:grid; grid-template-columns:300px minmax(0,1fr) 400px; grid-template-rows:72px minmax(0,1fr) 160px; height:100vh;}
  footer{display:flex; align-items:center; overflow:hidden;}
  .mainSwiper{width:100%; height:100%;}
}
@media(max-width:1024px){
  .app-grid{display:flex; flex-direction:column; height:auto;}
  header{position:sticky; top:0; z-index:1000; height:72px; background:#fff; border-bottom:1px solid #eee;}
  #svg-container{height:55vh; min-height:340px; max-height:420px;}
  .zoom-controls{display:none!important;}
  #sidebar-filters{position:fixed; inset:0 auto 0 -100%; width:300px; background:#fff; z-index:3000; transition:.35s ease; box-shadow:20px 0 50px rgba(0,0,0,.25);}
  #sidebar-filters.active{left:0;}
  #info-panel{padding:24px; border-left:none;}
  footer{padding-bottom:24px;}
  .mainSwiper{height:120px;}
}

    </style>
</head>
<body class="lg:overflow-hidden">

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="gallery-modal">
        <button onclick="closeFullImage()" class="absolute top-6 right-6 text-white text-5xl z-[5100] hover:text-red-500 transition-colors font-light">&times;</button>
        <div class="swiper fullSwiper">
            <div class="swiper-wrapper" id="full-gal-inner"></div>
            <div class="swiper-button-next !text-white"></div>
            <div class="swiper-button-prev !text-white"></div>
        </div>
    </div>

    <div class="app-grid">
        <header class="flex justify-between items-center px-10 col-span-full border-b bg-white">
            <div class="flex items-center gap-6">
                <button onclick="toggleMenu()" class="lg:hidden bg-black text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest" data-i18n="train.filter_btn">Фільтри</button>
                <div class="font-black text-2xl italic uppercase tracking-tighter">
                    <span data-i18n="train.title_1">Навчальна</span> <span class="text-[#DA291C]" data-i18n="train.title_2">Діяльність</span>
                </div>
            </div>
            <button onclick="resetAll()" class="text-[11px] font-black px-8 py-3 rounded-full border-2 border-gray-100 hover:border-black transition-all uppercase" data-i18n="train.reset">Скинути ↺</button>
        </header>

        <aside id="sidebar-filters" class="p-10 flex flex-col gap-10 overflow-y-auto border-r">
              
            <section>
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-6" data-i18n="train.filter_team">Команда</h3>
                <div class="space-y-2">
                    <label class="flex items-center gap-4 text-sm font-black p-3 cursor-pointer hover:bg-gray-50 rounded-2xl transition-all">
                        <input type="radio" name="team" value="all" checked onchange="handleTeam('all')" class="w-5 h-5 accent-red-600"> <span data-i18n="train.all">Всі</span>
                    </label>
                    <label class="flex items-center gap-4 text-sm font-black p-3 cursor-pointer hover:bg-gray-50 rounded-2xl transition-all">
                        <input type="radio" name="team" value="region" onchange="handleTeam('region')" class="w-5 h-5 accent-red-600"> <span data-i18n="train.regions">Області</span>
                    </label>
                    <label class="flex items-center gap-4 text-sm font-black p-3 cursor-pointer hover:bg-gray-50 rounded-2xl transition-all">
                        <input type="radio" name="team" value="nc" onchange="handleTeam('nc')" class="w-5 h-5 accent-red-600"> <span data-i18n="train.nc">НК</span>
                    </label>
                </div>
            </section>

            <section>
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-6" data-i18n="train.filter_donors">Підтримка донорів</h3>
                <div class="space-y-3">
                    <label class="flex items-center gap-4 text-sm font-black cursor-pointer"><input type="checkbox" class="sup-check w-5 h-5 accent-red-600" value="all" checked onchange="handleSupport('all')"> <span data-i18n="train.donor_all">Всі джерела</span></label>
                    <label class="flex items-center gap-4 text-sm font-black cursor-pointer"><input type="checkbox" class="sup-check w-5 h-5 accent-red-600" value="ger" onchange="handleSupport('ger')"> <span data-i18n="train.donor_ger">Німецький ЧХ</span></label>
                    <label class="flex items-center gap-4 text-sm font-black cursor-pointer"><input type="checkbox" class="sup-check w-5 h-5 accent-red-600" value="nor" onchange="handleSupport('nor')"> <span data-i18n="train.donor_nor">Норвезький ЧХ</span></label>
                </div>
            </section>

            <section>
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-6" data-i18n="train.filter_cat">Категорія</h3>
                <div class="grid gap-3">
                    <button onclick="setOwner('commerce')" id="btn-comm" class="owner-btn p-5 border-2 rounded-[24px] text-xs font-black transition-all uppercase tracking-widest" data-i18n="train.cat_comm">Комерція</button>
                    <button onclick="setOwner('beneficiary')" id="btn-ben" class="owner-btn p-5 border-2 rounded-[24px] text-xs font-black transition-all uppercase tracking-widest" data-i18n="train.cat_ben">Бенефіціари</button>
                </div>
            </section>

            <section>
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-6" data-i18n="train.filter_prog">Програма</h3>
                <div class="grid gap-2">
                    <button class="prog-btn border-2 p-4 rounded-2xl text-[10px] font-black text-left uppercase" data-val="6m" data-i18n="prog.6h">6 годин</button>
                    <button class="prog-btn border-2 p-4 rounded-2xl text-[10px] font-black text-left uppercase" data-val="12m" data-i18n="prog.12h">12 годин</button>
                    <button class="prog-btn border-2 p-4 rounded-2xl text-[10px] font-black text-left uppercase" data-val="seminar" data-i18n="prog.sem">Семінари</button>
                    <button class="prog-btn border-2 p-4 rounded-2xl text-[10px] font-black text-left uppercase" data-val="mk" data-i18n="prog.mk">МК</button>
                </div>
            </section>
        </aside>

        <main id="svg-container" class="relative">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="pz.zoomIn()">+</button>
                <button class="zoom-btn" onclick="pz.zoomOut()">-</button>
            </div>
        </main>

        <aside id="info-panel" class="p-12 overflow-y-auto border-l bg-white"></aside>

<footer class="col-span-full bg-white border-t p-4">
  <div class="swiper mainSwiper">
    <div class="swiper-wrapper" id="gal-inner"></div>
  </div>
</footer>
        </div>

    <script>
        let db = {}, selId = null, owner = null, prog = null, activeTeam = 'all', activeDonors = ['all'], pz;
        let fullSwiperInstance = null;
        let currentLang = localStorage.getItem('lang') || 'uk';
        let i18n = {};

        const supportMap = { ger: ["UA-07", "UA-56"], nor: ["UA-68", "UA-61", "UA-51", "UA-14", "UA-23", "UA-12", "UA-65"] };
        const photos = ["assets/images/t1.jpg", "assets/images/t2.jpg", "assets/images/t3.jpg", "assets/images/t4.jpg"];

        // 1. ІНІЦІАЛІЗАЦІЯ МОВИ
        async function initI18n() {
            try {
                const res = await fetch('../assets/translations.json');
                const data = await res.json();
                i18n = data[currentLang] || data['uk'];

                // Переклад статичних елементів HTML
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (i18n[key]) el.innerHTML = i18n[key];
                });
                
                start(); // Запуск основного функціоналу після перекладу
            } catch (err) {
                console.error("I18n Error:", err);
                start();
            }
        }

        function changeLanguage(lang) {
            localStorage.setItem('lang', lang);
            // Примусово знімаємо блокування перед перезавантаженням
            document.body.style.overflow = 'auto';
            window.location.reload();
}

        // 2. ЗАПУСК КАРТИ ТА ДАНИХ
        async function start() {
            const [dRes, sRes] = await Promise.all([
                fetch('../assets/images/data.json').then(r => r.json()),
                fetch('../assets/ukraine.svg').then(r => r.text())
            ]);
            db = dRes.analytics.regions;
            const container = document.getElementById('svg-container');
            container.insertAdjacentHTML('afterbegin', sRes);
            const svgEl = container.querySelector('svg');

            const initZoom = () => {
                    const isMobile = window.innerWidth <= 1024;

                    if (pz) pz.destroy();

                    if (isMobile) {
                        // ❌ НІЯКОГО ZOOM НА МОБІЛЬНОМУ
                        pz = svgPanZoom(svgEl, {
                        zoomEnabled: false,
                        panEnabled: false,
                        controlIconsEnabled: false,
                        dblClickZoomEnabled: false,
                        fit: true,
                        center: true
                        });
                    } else {
                        // ✅ DESKTOP
                        pz = svgPanZoom(svgEl, {
                        zoomEnabled: true,
                        panEnabled: true,
                        dblClickZoomEnabled: false,
                        fit: true,
                        center: true,
                        minZoom: 1,
                        maxZoom: 1
                        });
                    }
                    };

            initZoom();
            window.addEventListener('resize', initZoom);
            initEvents();
            initGallery();
            refresh();
        }

        // 3. ГАЛЕРЕЯ
        function initGallery() {
            const galInner = document.getElementById('gal-inner');
            const fullGalInner = document.getElementById('full-gal-inner');
            photos.forEach((url, idx) => {
                galInner.innerHTML += `<div class="swiper-slide h-28 rounded-[28px] overflow-hidden border-4 border-white shadow-md cursor-zoom-in" onclick="openFullImage(${idx})"><img src="../${url}" class="w-full h-full object-cover"></div>`;
                fullGalInner.innerHTML += `<div class="swiper-slide"><img src="../${url}"></div>`;
            });
            new Swiper(".mainSwiper", { slidesPerView: 2.5, spaceBetween: 20, breakpoints: { 1024: { slidesPerView: 6 } } });
            fullSwiperInstance = new Swiper(".fullSwiper", {
                slidesPerView: 1,
                navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                keyboard: { enabled: true }
            });
        }

        function openFullImage(idx) {
            document.getElementById('gallery-modal').style.display = 'flex';
            fullSwiperInstance.params.loop = true;
            fullSwiperInstance.update();
            fullSwiperInstance.slideTo(idx, 0);
            document.body.style.overflow = 'hidden';
        }

        function closeFullImage() {
            document.getElementById('gallery-modal').style.display = 'none';
            document.body.style.overflow = '';
        }

        // 4. ФІЛЬТРИ ТА ЛОГІКА
        function handleTeam(v) { activeTeam = v; if(window.innerWidth < 1024) toggleMenu(); refresh(); }
        
        function handleSupport(v) {
            const checks = Array.from(document.querySelectorAll('.sup-check'));
            if (v === 'all') { checks.forEach(c => c.checked = (c.value === 'all')); activeDonors = ['all']; }
            else {
                document.querySelector('.sup-check[value="all"]').checked = false;
                activeDonors = checks.filter(c => c.checked).map(c => c.value);
                if (activeDonors.length === 0) { document.querySelector('.sup-check[value="all"]').checked = true; activeDonors = ['all']; }
            }
            refresh();
        }

        function getStats(id) {
            const reg = db[id]; if (!reg) return null;
            if (!activeDonors.includes('all')) {
                let m = (activeDonors.includes('ger') && supportMap.ger.includes(id)) || (activeDonors.includes('nor') && supportMap.nor.includes(id));
                if (!m) return null;
            }
            let res = { cp: 0, bp: 0, ce: 0, be: 0, details: {} };
            const teams = activeTeam === 'all' ? ['nc', 'region'] : [activeTeam];
            teams.forEach(t => {
                if (!reg.stats[t]) return;
                Object.entries(reg.stats[t]).forEach(([pk, v]) => {
                    if (!prog || prog === pk) { res.cp += v.comm.persons; res.ce += v.comm.events; res.bp += v.ben.persons; res.be += v.ben.events; }
                    if (!res.details[pk]) res.details[pk] = { cp:0, bp:0 };
                    res.details[pk].cp += v.comm.persons; res.details[pk].bp += v.ben.persons;
                });
            });
            res.totalP = (owner === 'commerce') ? res.cp : (owner === 'beneficiary' ? res.bp : res.cp + res.bp);
            return res;
        }

        function refresh() {
            let maxP = 0; const currentStats = {};
            Object.keys(db).forEach(id => {
                const s = getStats(id); currentStats[id] = s;
                if (s && s.totalP > maxP) maxP = s.totalP;
            });

            document.querySelectorAll('path').forEach(path => {
                const id = path.id.toUpperCase(); const s = currentStats[id];
                path.classList.toggle('selected', id === selId);
                if (id === "UA-43" || id === "UA-09") { path.classList.remove('is-dimmed'); path.style.fill = s && s.totalP > 0 ? '#F6C697' : '#f1f5f9'; return; }
                if (!s || (s.totalP === 0 && activeTeam !== 'all' && !db[id]?.stats[activeTeam])) { path.style.fill = '#f8fafc'; path.classList.add('is-dimmed'); }
                else {
                    path.classList.remove('is-dimmed');
                    if (s.totalP === 0) path.style.fill = '#f1f5f9';
                    else {
                        const ratio = s.totalP / (maxP || 1);
                        const colors = owner === 'beneficiary' ? ['#A8D0D2', '#60ABAF', '#2D5A5C'] : ['#F6C697', '#ED9740', '#A35A1A'];
                        path.style.fill = ratio < 0.33 ? colors[0] : (ratio < 0.66 ? colors[1] : colors[2]);
                    }
                }
            });

            if (window.innerWidth <= 1024) {
  const sidebar = document.getElementById('sidebar-filters');
  const closeBtn = document.getElementById('close-filters');

  closeBtn.addEventListener('click', () => {
    sidebar.classList.remove('active');
  });
}
            renderPanel(currentStats);
        }

        // 5. ДИНАМІЧНИЙ ПЕРЕКЛАД КОНТЕНТУ
        function getProgName(key) {
            const dictKey = "prog." + key;
            return i18n[dictKey] || key;
        }

        function getRegionName(id) {
            if (!id) return i18n["train.all_ukraine"] || "Вся Україна";
            if (i18n[id]) return i18n[id]; // Беремо назву з translations.json (напр. UA-32)
            const reg = db[id];
            return reg ? (currentLang === 'uk' ? reg.name_uk : (reg.name_en || reg.name_uk)) : id;
        }

       

       function renderPanel(allStats) {
    const panel = document.getElementById('info-panel');
    let tP = 0, tE = 0, tCP = 0, tBP = 0, tCE = 0, tBE = 0, combinedDet = {};

    // 1. Універсальний внутрішній словник (Заміна ключів + Переклади)
    const lib = {
        uk: {
            "train.total_reach": "Загальне охоплення",
            "train.people": "Людей",
            "train.events": "Подій",
            "train.reset_reg": "Скинути вибір регіону",
            "train.cat_comm": "Комерція",
            "train.cat_ben": "Бенефіціари",
            "train.by_prog": "Статистика за програмами",
            "train.comm_short": "Комерція",
            "train.ben_short": "Бенефіціари",
            // Перехоплення технічних ключів програм
            "6m": "6-ти годинний",
            "12m": "12-ти годинний",
            "48m": "48-ми годинний",
            "seminar": "Семінар",
            "mk": "Майстер-клас"
        },
        en: {
            "train.total_reach": "Total Reach",
            "train.people": "People",
            "train.events": "Events",
            "train.reset_reg": "Reset selection",
            "train.cat_comm": "Commercial",
            "train.cat_ben": "Beneficiaries",
            "train.by_prog": "Stats by programs",
            "train.comm_short": "Comm.",
            "train.ben_short": "Ben.",
            "6m": "6 hours Program",
            "12m": "12 hours Program",
            "48m": "48 hours Program",
            "seminar": "Seminar",
            "mk": "Master Class"
        }
    };

    // Функція-помічник для отримання значень
    const lang = typeof currentLang !== 'undefined' ? currentLang : 'uk';
    const t = (key) => (lib[lang] && lib[lang][key]) || (window.i18n && window.i18n[key]) || key;

    // Розрахунок статистики
    Object.values(allStats).forEach(s => {
        if (!s) return;
        tP += s.totalP; tCP += s.cp; tBP += s.bp; tCE += s.ce; tBE += s.be; tE += (s.ce + s.be);
        Object.entries(s.details).forEach(([k, v]) => {
            if (!combinedDet[k]) combinedDet[k] = { cp: 0, bp: 0 };
            combinedDet[k].cp += v.cp; combinedDet[k].bp += v.bp;
        });
    });

    const cur = selId ? (allStats[selId] || { cp: 0, bp: 0, ce: 0, be: 0, details: {} }) : { cp: tCP, bp: tBP, ce: tCE, be: tBE, details: combinedDet };
    const name = typeof getRegionName === 'function' ? getRegionName(selId) : (selId || t("train.all_ukraine"));
    const oldVal = parseInt(document.getElementById('main-count')?.innerText || 0);

    panel.innerHTML = `
        <div class="mb-12 p-10 bg-[#0F0F0F] text-white rounded-[40px] shadow-2xl relative overflow-hidden">
            <p class="text-[10px] font-black uppercase opacity-40 tracking-[0.3em] mb-3">${t("train.total_reach")}</p>
            <div class="flex justify-between items-end">
                <div>
                    <p id="main-count" class="text-4xl font-black tracking-tighter">0</p>
                    <p class="text-xs font-bold text-gray-500 uppercase mt-2">${t("train.people")}</p>
                </div>
                <div class="text-right">
                    <p class="text-3xl font-black text-red-600">${tE}</p>
                    <p class="text-[10px] font-bold text-gray-500 uppercase">${t("train.events")}</p>
                </div>
            </div>
        </div>

        <div class="mb-12">
            <h2 class="text-3xl font-black uppercase italic tracking-tighter leading-[0.85]">${name}</h2>
            <div class="h-3 w-20 bg-red-600 mt-8 rounded-full"></div>
            ${selId ? `<button onclick="deselect()" class="mt-8 text-xs font-black text-red-500 uppercase tracking-widest hover:text-red-400 transition-colors">${t("train.reset_reg")}</button>` : ''}
        </div>

        <div class="grid gap-5 mb-12">
            <div class="p-8 bg-orange-500 text-white rounded-[32px] shadow-xl">
                <p class="text-[10px] font-black opacity-60 uppercase mb-2">${t("train.cat_comm")}</p>
                <p class="text-3xl font-black">${cur.cp} <span class="text-2xl opacity-40">/ ${cur.ce}</span></p>
            </div>
            <div class="p-8 bg-teal-600 text-white rounded-[32px] shadow-xl">
                <p class="text-[10px] font-black opacity-60 uppercase mb-2">${t("train.cat_ben")}</p>
                <p class="text-3xl font-black">${cur.bp} <span class="text-2xl opacity-40">/ ${cur.be}</span></p>
            </div>
        </div>

        <div class="space-y-4">
            <p class="text-xs font-black text-gray-400 uppercase tracking-[0.4em] mb-4">${t("train.by_prog")}</p>
            ${Object.entries(cur.details).map(([k, v]) => (v.cp + v.bp > 0) ? `
                <div class="p-6 bg-gray-50 rounded-[1em] border-2 ${typeof prog !== 'undefined' && prog === k ? 'border-red-600 bg-white' : 'border-transparent'}">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-black uppercase tracking-wider">${t(k)}</span>
                        <span class="text-lg font-black text-red-600">${v.cp + v.bp}</span>
                    </div>
                    <div class="flex gap-8 text-[10px] font-black uppercase text-gray-400">
                        <span>${t("train.comm_short")}: <span class="text-orange-600">${v.cp}</span></span>
                        <span>${t("train.ben_short")}: <span class="text-teal-700">${v.bp}</span></span>
                    </div>
                </div>` : '').join('')}
        </div>
    `;

    // Запуск анімації
    if (typeof animateValue === 'function') {
        animateValue('main-count', oldVal, selId ? cur.cp + cur.bp : tP, 1000);
    }
}

        // 6. ДОПОМІЖНІ ФУНКЦІЇ
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id); if (!obj) return;
            let sT = null;
            const step = (t) => {
                if (!sT) sT = t;
                const progress = Math.min((t - sT) / duration, 1);
                obj.innerText = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

       // ================== INIT EVENTS ==================
function initEvents() {
    const svgContainer = document.getElementById('svg-container');
    if(svgContainer) {
        svgContainer.addEventListener('click', e => {
            const p = e.target.closest('path');
            if (p && !p.classList.contains('is-dimmed')) {
                selId = (selId === p.id.toUpperCase()) ? null : p.id.toUpperCase();
                refresh();
            }
        });
    }

    document.querySelectorAll('.prog-btn').forEach(b => {
        b.addEventListener('click', function() {
            prog = (prog === this.dataset.val) ? null : this.dataset.val;
            document.querySelectorAll('.prog-btn').forEach(x => x.classList.toggle('prog-active', x.dataset.val === prog));
            refresh();
        });
    });

    // Мобільна кнопка "Скинути ↺" нижче фільтрів
    const resetBtnMobile = document.getElementById('reset-btn-mobile');
    if(resetBtnMobile) {
        resetBtnMobile.addEventListener('click', resetAll);
    }
}

// ================== RESET ALL ==================
function resetAll() {
    selId = null;
    owner = null;
    prog = null;
    activeTeam = 'all';
    activeDonors = ['all'];

    // Відновлюємо чекбокси
    document.querySelectorAll('.sup-check').forEach(c => c.checked = (c.value === 'all'));
    document.querySelectorAll('.prog-btn').forEach(b => b.classList.remove('prog-active'));
    document.querySelectorAll('.owner-btn').forEach(b => b.classList.remove('active-orange', 'active-teal'));

    // Якщо pz існує (svgPanZoom)
    if(pz) { pz.resetZoom(); pz.center(); }

    refresh();
}

// ================== REFRESH ==================
function refresh() {
    // Перевіряємо, чи svg-container реально існує
    const svgContainer = document.getElementById('svg-container');
    if(!svgContainer) return;

    let maxP = 0;
    const currentStats = {};

    Object.keys(db).forEach(id => {
        const s = getStats(id);
        currentStats[id] = s;
        if(s && s.totalP > maxP) maxP = s.totalP;
    });

    svgContainer.querySelectorAll('path').forEach(path => {
        const id = path.id.toUpperCase();
        const s = currentStats[id];
        path.classList.toggle('selected', id === selId);

        if (!s || (s.totalP === 0 && activeTeam !== 'all' && !db[id]?.stats[activeTeam])) {
            path.style.fill = '#f8fafc';
            path.classList.add('is-dimmed');
        } else {
            path.classList.remove('is-dimmed');
            if (s.totalP === 0) path.style.fill = '#f1f5f9';
            else {
                const ratio = s.totalP / (maxP || 1);
                const colors = owner === 'beneficiary' ? ['#A8D0D2','#60ABAF','#2D5A5C'] : ['#F6C697','#ED9740','#A35A1A'];
                path.style.fill = ratio < 0.33 ? colors[0] : (ratio < 0.66 ? colors[1] : colors[2]);
            }
        }
    });

    renderPanel(currentStats);
}

// ================== МІСЦЕ ДЛЯ КНОПКИ "СКИНУТИ ↺" НА МОБІЛЬНИХ ==================

В HTML додай кнопку у sidebar нижче фільтрів:
<button id="reset-btn-mobile" class="block w-full mt-6 px-6 py-3 text-sm font-black text-white bg-red-600 rounded-2xl lg:hidden">Скинути ↺</button>
*/
        function toggleMenu() { document.getElementById('sidebar-filters').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

            owner = (owner === o) ? null : o;

            document.getElementById('btn-ben').classList.toggle('active-teal', owner === 'beneficiary');

        }

            document.querySelectorAll('.sup-check').forEach(c => c.checked = c.value === 'all');
            document.querySelectorAll('.prog-btn').forEach(b => b.classList.remove('prog-active'));
            document.querySelectorAll('.owner-btn').forEach(b => b.classList.remove('active-orange', 'active-teal'));
            document.querySelector('input[value="all"]').checked = true;
            if(pz) { pz.resetZoom(); pz.center(); }
            refresh();
        }

        // ЗАПУСК
        initI18n();
    </script>
