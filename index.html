<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impact Dashboard 2025-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #DA291C; --brand-teal: #60ABAF; --brand-orange: #ED9740; }
        
        /* Базові налаштування */
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f4f7f6; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Блокування скролу для десктопа (щоб інтерфейс був як додаток) */
        @media (min-width: 1024px) { 
            body { overflow: hidden; height: 100vh; } 
        }

        /* Навігація */
        .nav-container { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); 
            border-bottom: 2px solid #000; z-index: 1000; 
            padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; 
            height: 4.5rem;
        }
        .nav-logo { font-size: 1.25rem; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -0.05em; }
        
        .nav-buttons { display: none; gap: 0.4rem; }
        @media (min-width: 1280px) { .nav-buttons { display: flex; } }

        /* Стиль кнопок (Бруталізм) */
        .nav-btn { 
            padding: 0.5rem 0.8rem; background: white; border: 2px solid #000; 
            font-size: 10px; font-weight: 900; text-transform: uppercase; 
            cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        .nav-btn:hover { background: #000; color: white; }
        .nav-btn.active { background: var(--brand-red); border-color: var(--brand-red); color: white; }
        
        .lang-btn { padding: 0.3rem 0.6rem; font-size: 10px; font-weight: 900; border: 2px solid #000; cursor: pointer; transition: 0.2s; }
        .lang-btn.active { background: #000; color: #fff; }

        /* Контейнери сторінок */
        .page-container { 
            position: absolute; top: 4.5rem; left: 0; right: 0; bottom: 0; 
            opacity: 0; pointer-events: none; 
            transition: opacity 0.3s ease;
            background: #f4f7f6;
            overflow-y: auto;
        }
        .page-container.active { opacity: 1; pointer-events: all; }

        /* Головна сторінка (Hero) */
        .title-page { 
            min-height: calc(100vh - 4.5rem); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 2rem; background: #fff;
        }
        .title-main { 
            font-size: clamp(2rem, 8vw, 4.5rem); font-weight: 900; 
            text-transform: uppercase; font-style: italic; 
            line-height: 0.9; text-align: center; 
        }
        
        .title-stats { 
            display: grid; grid-template-columns: 1fr; gap: 1.5rem; 
            margin-top: 3.5rem; width: 100%; max-width: 900px; 
        }
        @media (min-width: 768px) { .title-stats { grid-template-columns: repeat(3, 1fr); } }

        .title-stat-value { font-size: 3rem; font-weight: 900; font-style: italic; line-height: 1; }
        .title-stat-label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.15em; margin-top: 0.5rem; }

        .page-frame { width: 100%; height: 100%; border: none; display: block; }

        /* Мобільне меню */
        #mobile-menu {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
            background: white; z-index: 2000; padding: 1.5rem;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; gap: 0.6rem;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        #mobile-menu.open { right: 0; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1999; display: none; backdrop-filter: blur(2px); }
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="nav-logo">
            <span data-i18n="nav.logo_first">Перша</span> 
            <span style="color: var(--brand-red);" data-i18n="nav.logo_aid">допомога</span>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4">
            <div class="flex items-center gap-1 border-r-2 border-gray-100 pr-2 md:pr-4">
                <button onclick="I18n.set('uk')" id="btn-uk" class="lang-btn">UA</button>
                <button onclick="I18n.set('en')" id="btn-en" class="lang-btn">EN</button>
            </div>

            <div class="nav-buttons">
                <button class="nav-btn" data-page="home" onclick="Navigation.show('home')" data-i18n="nav.home">Головна</button>
                <button class="nav-btn" data-page="interactive" onclick="Navigation.show('interactive')" data-i18n="nav.interactive">Тренінги</button>
                <button class="nav-btn" data-page="events" onclick="Navigation.show('events')" data-i18n="nav.events">ДСНС</button>
                <button class="nav-btn" data-page="analytics" onclick="Navigation.show('analytics')" data-i18n="nav.analytics">Аналітика</button>
                <button class="nav-btn" data-page="research" onclick="Navigation.show('research')" data-i18n="nav.research">Інклюзія</button>
                <button class="nav-btn" data-page="geography" onclick="Navigation.show('geography')" data-i18n="nav.geography">Генрі</button>
                <button class="nav-btn" data-page="medical" onclick="Navigation.show('medical')" data-i18n="nav.medical">Аптечки</button>
                <button class="nav-btn" data-page="roadmap" onclick="Navigation.show('roadmap')" data-i18n="nav.roadmap">Платформа</button>
            </div>

            <button onclick="UI.toggleMenu(true)" class="xl:hidden p-2 border-2 border-black">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 8h16M4 16h16"></path></svg>
            </button>
        </div>
    </nav>

    <div id="menu-overlay" class="menu-overlay" onclick="UI.toggleMenu(false)"></div>
    <div id="mobile-menu">
        <div class="flex justify-between items-center mb-6">
            <span class="font-black italic uppercase" data-i18n="nav.menu">Меню</span>
            <button onclick="UI.toggleMenu(false)" class="text-3xl">&times;</button>
        </div>
        <button class="nav-btn w-full text-left py-3" data-page="home" onclick="Navigation.show('home'); UI.toggleMenu(false)" data-i18n="nav.home">Головна</button>
        <button class="nav-btn w-full text-left py-3" data-page="interactive" onclick="Navigation.show('interactive'); UI.toggleMenu(false)" data-i18n="nav.interactive">Тренінги</button>
        <button class="nav-btn w-full text-left py-3" data-page="events" onclick="Navigation.show('events'); UI.toggleMenu(false)" data-i18n="nav.events">ДСНС</button>
        <button class="nav-btn w-full text-left py-3" data-page="analytics" onclick="Navigation.show('analytics'); UI.toggleMenu(false)" data-i18n="nav.analytics">Аналітика</button>
        <button class="nav-btn w-full text-left py-3" data-page="research" onclick="Navigation.show('research'); UI.toggleMenu(false)" data-i18n="nav.research">Інклюзія</button>
        <button class="nav-btn w-full text-left py-3" data-page="geography" onclick="Navigation.show('geography'); UI.toggleMenu(false)" data-i18n="nav.geography">Генрі</button>
        <button class="nav-btn w-full text-left py-3" data-page="medical" onclick="Navigation.show('medical'); UI.toggleMenu(false)" data-i18n="nav.medical">Аптечки</button>
        <button class="nav-btn w-full text-left py-3" data-page="roadmap" onclick="Navigation.show('roadmap'); UI.toggleMenu(false)" data-i18n="nav.roadmap">Платформа</button>
        </div>

    <main>
        <div id="page-home" class="page-container">
            <div class="title-page">
                <h1 class="title-main" data-i18n="home.title">Діяльність відділу <br><span style="color: var(--brand-red);">Першої</span> допомоги</h1>
                <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.4em] mt-8" data-i18n="home.subtitle">Комплексна аналітика 2025</p>
                
                <div class="title-stats">
                    <div class="text-center">
                        <div class="title-stat-value" style="color: var(--brand-teal);">96000+</div>
                        <div class="title-stat-label" data-i18n="home.stat_participants">Учасників</div>
                    </div>
                    <div class="text-center">
                        <div class="title-stat-value" style="color: var(--brand-orange);">4394</div>
                        <div class="title-stat-label" data-i18n="home.stat_events">Заходів</div>
                    </div>
                    <div class="text-center">
                        <div class="title-stat-value" style="color: var(--brand-red);">23</div>
                        <div class="title-stat-label" data-i18n="home.stat_regions">Регіонів</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-interactive" class="page-container"><iframe data-src="pages/trainings.html" class="page-frame"></iframe></div>
        <div id="page-events" class="page-container"><iframe data-src="pages/events.html" class="page-frame"></iframe></div>
        <div id="page-analytics" class="page-container"><iframe data-src="pages/analytics.html" class="page-frame"></iframe></div>
        <div id="page-research" class="page-container"><iframe data-src="pages/research.html" class="page-frame"></iframe></div>
        <div id="page-geography" class="page-container"><iframe data-src="pages/geography.html" class="page-frame"></iframe></div>
        <div id="page-medical" class="page-container"><iframe data-src="pages/medical.html" class="page-frame"></iframe></div>
        <div id="page-roadmap" class="page-container"><iframe data-src="pages/roadmap.html" class="page-frame"></iframe></div>
    </main>

    <script>
        // --- 1. МОДУЛЬ ПЕРЕКЛАДУ (Ваш плаский JSON) ---
        const I18n = {
            lang: localStorage.getItem('lang') || 'uk',
            data: null,

            async init() {
                try {
                    const res = await fetch('./assets/translations.json');
                    this.data = await res.json();
                    this.apply();
                } catch (e) { console.error("i18n load fail", e); }
            },

            set(l) {
                this.lang = l;
                localStorage.setItem('lang', l);
                this.apply();
                this.syncIframes();
            },

            apply() {
                if (!this.data || !this.data[this.lang]) return;
                const dict = this.data[this.lang];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (dict[key]) el.innerHTML = dict[key];
                });
                document.getElementById('btn-uk').classList.toggle('active', this.lang === 'uk');
                document.getElementById('btn-en').classList.toggle('active', this.lang === 'en');
                document.documentElement.lang = this.lang;
            },

            syncIframes() {
                document.querySelectorAll('iframe').forEach(f => {
                    if (f.src) {
                        const url = new URL(f.src);
                        url.searchParams.set('lng', this.lang);
                        f.src = url.href;
                    }
                });
            }
        };

        // --- 2. МОДУЛЬ НАВІГАЦІЇ ---
        const Navigation = {
            current: localStorage.getItem('lastPage') || 'home',

            init() {
                this.show(this.current);
            },

            show(id) {
                this.current = id;
                localStorage.setItem('lastPage', id);

                // Візуальне перемикання контейнерів
                document.querySelectorAll('.page-container').forEach(p => {
                    p.classList.remove('active');
                });
                
                const target = document.getElementById('page-' + id);
                if (target) {
                    target.classList.add('active');
                    
                    // Lazy load iframe
                    const frame = target.querySelector('iframe');
                    if (frame && !frame.src) {
                        const base = frame.getAttribute('data-src');
                        frame.src = `${base}?lng=${I18n.lang}`;
                    }
                }

                // Оновлення активного стану кнопок
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-page') === id);
                });
            }
        };

        // --- 3. МОДУЛЬ UI ---
        const UI = {
            toggleMenu(open) {
                document.getElementById('mobile-menu').classList.toggle('open', open);
                document.getElementById('menu-overlay').style.display = open ? 'block' : 'none';
                document.body.style.overflow = open ? 'hidden' : '';
            }
        };

        // Запуск всього
        window.onload = () => {
            I18n.init();
            Navigation.init();
        };
    </script>
</body>
</html>
